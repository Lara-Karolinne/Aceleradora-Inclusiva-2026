<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário elaborado</title>
</head>
<body>

    <h1>Formulário</h1>

    <form action="#" method="POST">

        <fieldset>
            <legend>Dados pessoais</legend>
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
            <br><br>

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco">
            <br><br>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade">
            <br><br>

            <label for="estado">Estado:</label>
            <select id="estado" name="estado">
                <option value="sp">São Paulo</option>
                <option value="al">Alagoas</option>
                <option value="rj">Rio de Janeiro</option>
            </select>
        </fieldset>

        <br>

        <fieldset>
            <legend>Dados profissionais</legend>

            <p>Natureza do Cargo</p>
            <input type="radio" id="gerencia" name="cargo" value="gerencia" checked>
            <label for="gerencia">Gerência</label>

            <input type="radio" id="financeiro" name="cargo" value="financeiro">
            <label for="financeiro">Financeiro</label>

            <input type="radio" id="recepcao" name="cargo" value="recepcao">
            <label for="recepcao">Recepção</label>

            <input type="radio" id="adm" name="cargo" value="administrativo">
            <label for="adm">Administrativo</label>

            <input type="radio" id="juridico" name="cargo" value="juridico">
            <label for="juridico">Jurídico</label>

            <p>Área de interesse</p>
            <input type="checkbox" id="comp" name="interesse" value="computacao">
            <label for="comp">Computação</label>

            <input type="checkbox" id="bio" name="interesse" value="biologia">
            <label for="bio">Biologia</label>

            <input type="checkbox" id="meio" name="interesse" value="meio_ambiente">
            <label for="meio">Meio Ambiente</label>

            <input type="checkbox" id="eng" name="interesse" value="engenharia">
            <label for="eng">Engenharia</label>

            <input type="checkbox" id="hist" name="interesse" value="historia">
            <label for="hist">História</label>

            <br><br>
            <label for="curriculo">Mini-currículo:</label><br>
            <textarea id="curriculo" name="curriculo" rows="6" cols="60"></textarea>
        </fieldset>

        <br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

    </form>

</body>
</html>
