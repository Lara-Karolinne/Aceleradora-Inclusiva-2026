<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1: Formulário de Cadastro</title>
</head>
<body>

    <h1>Formulário de Cadastro</h1>

    <form action="/enviar" method="POST">
        
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="usuario_nome" maxlength="30" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="usuario_email" required>
        <br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="usuario_senha" minlength="8" required>
        <br><br>

        <label for="confirmar_senha">Confirmar Senha:</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" minlength="8" required>
        <br><br>
        
        <p>Tipo Sanguíneo:</p>
        
        <input type="radio" id="sangue_a_pos" name="tipo_sanguineo" value="A+">
        <label for="sangue_a_pos">A+</label>

        <input type="radio" id="sangue_a_neg" name="tipo_sanguineo" value="A-">
        <label for="sangue_a_neg">A-</label>

        <input type="radio" id="sangue_b_pos" name="tipo_sanguineo" value="B+">
        <label for="sangue_b_pos">B+</label>

        <input type="radio" id="sangue_b_neg" name="tipo_sanguineo" value="B-">
        <label for="sangue_b_neg">B-</label>
        <br><br>

        <input type="radio" id="sangue_ab_pos" name="tipo_sanguineo" value="AB+">
        <label for="sangue_ab_pos">AB+</label>

        <input type="radio" id="sangue_ab_neg" name="tipo_sanguineo" value="AB-">
        <label for="sangue_ab_neg">AB-</label>

        <input type="radio" id="sangue_o_pos" name="tipo_sanguineo" value="O+">
        <label for="sangue_o_pos">O+</label>

        <input type="radio" id="sangue_o_neg" name="tipo_sanguineo" value="O-">
        <label for="sangue_o_neg">O-</label>
        <br><br>

        <input type="checkbox" id="termos" name="aceitou_termos" required>
        <label for="termos">Aceito os termos de uso</label>
        <br><br>

        <input type="checkbox" id="promo" name="receber_promocoes" checked>
        <label for="promo">Desejo receber e-mails de promoções</label>
        <br><br>

        <input type="submit" value="Enviar Dados">
        <input type="reset" value="Limpar Formulário">

    </form>

</body>
</html>
